<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Energía Diaria</title>
    
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Íconos (Phosphor Icons - Funcionan nativo en HTML) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Librerías de React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Procesa el código de React en el navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-orange-50 to-rose-50 min-h-screen text-slate-800">
    
    <!-- Aquí se cargará la app -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // --- 1. IMPORTACIONES DE FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- 2. TU CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAkhWpZAD7dS02e31o47q_IkI_C3cwKvw0",
            authDomain: "habitos-guada.firebaseapp.com",
            projectId: "habitos-guada",
            storageBucket: "habitos-guada.firebasestorage.app",
            messagingSenderId: "151671576862",
            appId: "1:151671576862:web:54a60bf332537b683a110f",
            measurementId: "G-2QNG8Y123J"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 3. COMPONENTE PRINCIPAL ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('daily');
            const [date] = useState(new Date().toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }));
            const [saved, setSaved] = useState(false);
            const [historicalData, setHistoricalData] = useState([]);
            const [loading, setLoading] = useState(true);

            const [monthlyGoals, setMonthlyGoals] = useState([
                { id: 1, habitKey: '', targetDays: '' },
                { id: 2, habitKey: '', targetDays: '' },
                { id: 3, habitKey: '', targetDays: '' }
            ]);

            const habitLabels = {
                gym: 'Gimnasia', recreation: 'Recreación', enzo: 'Pasear a Enzo', 
                inform: 'Informarme', learn: 'Aprender algo', friends: 'Amigos/Familia', nico: 'Tiempo con Nico'
            };

            const [habits, setHabits] = useState({ gym: false, recreation: false, enzo: false, inform: false, learn: false, friends: false, nico: false });
            const [ratings, setRatings] = useState({ sleep: 0, food: 0, water: 0, work: 0, phone: 0 });
            const [steps, setSteps] = useState('');
            const [cycleDay, setCycleDay] = useState('');
            const [mood, setMood] = useState(null);
            const [physicalState, setPhysicalState] = useState([]);

            // Autenticación
            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } catch (err) { console.error("Auth error", err); }
                };
                initAuth();
                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) setLoading(false);
                });
            }, []);

            // Carga de Datos
            useEffect(() => {
                if (!user) return;
                
                // NOTA: Usamos la ruta simplificada para coincidir con tus reglas de Firestore
                const logsRef = collection(db, 'users', user.uid, 'daily_logs');
                const unsubLogs = onSnapshot(logsRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setHistoricalData(data);
                    setLoading(false);

                    const todayId = new Date().toISOString().split('T')[0];
                    const todayData = data.find(d => d.id === todayId);
                    if (todayData) {
                        setHabits(todayData.habits || habits);
                        setRatings(todayData.ratings || ratings);
                        setSteps(todayData.steps || '');
                        setCycleDay(todayData.cycleDay || '');
                        setMood(todayData.mood || null);
                        setPhysicalState(todayData.physicalState || []);
                    }
                });

                const goalsRef = doc(db, 'users', user.uid, 'settings');
                const unsubGoals = onSnapshot(goalsRef, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().goals) {
                        setMonthlyGoals(docSnap.data().goals);
                    }
                });

                return () => { unsubLogs(); unsubGoals(); };
            }, [user]);

            // Lógica de Puntuación (Basada en tu imagen)
            const dailyScore = useMemo(() => {
                let score = 0;
                const habitKeys = Object.keys(habits);
                const completedHabitsCount = habitKeys.filter(k => habits[k]).length;
                score += (completedHabitsCount / habitKeys.length) * 55; // Hasta 55 pts
                score += (ratings.food || 0) * 5;  // Hasta 25 pts
                score += (ratings.water || 0) * 2; // Hasta 10 pts
                score += (ratings.sleep || 0) * 2; // Hasta 10 pts
                return Math.min(100, Math.round(score));
            }, [habits, ratings]);

            // Handlers
            const handleSave = async () => {
                if (!user) return;
                setSaved(true);
                const todayId = new Date().toISOString().split('T')[0];
                const logDoc = doc(db, 'users', user.uid, 'daily_logs', todayId);
                
                await setDoc(logDoc, {
                    date: new Date().toISOString(),
                    score: dailyScore,
                    habits, ratings, steps, cycleDay, mood, physicalState
                });
                setTimeout(() => setSaved(false), 2000);
            };

            const updateGoal = async (id, field, value) => {
                const updated = monthlyGoals.map(g => g.id === id ? { ...g, [field]: value } : g);
                setMonthlyGoals(updated);
                if (user) {
                    const goalsRef = doc(db, 'users', user.uid, 'settings');
                    await setDoc(goalsRef, { goals: updated }, { merge: true });
                }
            };

            const toggleHabit = (key) => setHabits(prev => ({ ...prev, [key]: !prev[key] }));
            const setRating = (key, value) => setRatings(prev => ({ ...prev, [key]: value }));
            const togglePhysicalState = (tag) => {
                setPhysicalState(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);
            };

            // Componentes UI Reutilizables
            const HabitButton = ({ active, onClick, icon, label, color }) => {
                const colorStyles = {
                    emerald: active ? 'bg-emerald-50 border-emerald-300 text-emerald-800' : 'hover:border-emerald-200',
                    amber: active ? 'bg-amber-50 border-amber-300 text-amber-800' : 'hover:border-amber-200',
                    purple: active ? 'bg-purple-50 border-purple-300 text-purple-800' : 'hover:border-purple-200',
                    blue: active ? 'bg-blue-50 border-blue-300 text-blue-800' : 'hover:border-blue-200',
                    indigo: active ? 'bg-indigo-50 border-indigo-300 text-indigo-800' : 'hover:border-indigo-200',
                    rose: active ? 'bg-rose-50 border-rose-300 text-rose-800' : 'hover:border-rose-200',
                };
                return (
                    <button onClick={onClick} className={`flex items-center justify-between p-3 rounded-2xl transition-all border ${active ? colorStyles[color] : 'bg-stone-50 border-stone-100 text-stone-600 shadow-sm'}`}>
                        <div className="flex items-center gap-3">
                            <div className={`p-2 rounded-xl text-lg ${active ? 'bg-white shadow-sm' : 'bg-stone-200 text-stone-500'}`} dangerouslySetInnerHTML={{__html: icon}}></div>
                            <span className="font-bold text-sm">{label}</span>
                        </div>
                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${active ? 'border-current bg-current' : 'border-stone-300'}`}>
                            {active && <i className="ph-bold ph-check text-white text-xs"></i>}
                        </div>
                    </button>
                );
            };

            const RatingRow = ({ label, value, onChange, icon }) => (
                <div className="flex items-center justify-between p-2 rounded-xl hover:bg-stone-50 transition-colors">
                    <div className="flex items-center gap-2">
                        <div className="bg-stone-100 p-2 rounded-lg text-lg" dangerouslySetInnerHTML={{__html: icon}}></div>
                        <span className="font-bold text-sm text-slate-700">{label}</span>
                    </div>
                    <div className="flex gap-1.5">
                        {[1, 2, 3, 4, 5].map((num) => (
                            <button key={num} onClick={() => onChange(num)} className={`w-8 h-8 rounded-full text-sm font-black transition-all ${value === num ? 'bg-orange-400 text-white shadow-md scale-110' : 'bg-stone-100 text-stone-400 hover:bg-stone-200'}`}>
                                {num}
                            </button>
                        ))}
                    </div>
                </div>
            );

            const physicalTags = [
                { label: 'Llena de energía', icon: '<i class="ph-fill ph-lightning"></i>', type: 'positive' },
                { label: 'Liviana / Fuerte', icon: '<i class="ph-fill ph-barbell"></i>', type: 'positive' },
                { label: 'Descansada', icon: '<i class="ph-fill ph-coffee"></i>', type: 'positive' },
                { label: 'Inspirada', icon: '<i class="ph-fill ph-fire"></i>', type: 'positive' },
                { label: 'Cansada', icon: '<i class="ph-fill ph-battery-warning"></i>', type: 'negative' },
                { label: 'Dolorida', icon: '<i class="ph-fill ph-warning-circle"></i>', type: 'negative' },
                { label: 'Con Hambre', icon: '<i class="ph-fill ph-fork-knife"></i>', type: 'negative' },
                { label: 'Mal humorada', icon: '<i class="ph-fill ph-smiley-sad"></i>', type: 'negative' },
                { label: 'Dolor de cabeza', icon: '<i class="ph-fill ph-brain"></i>', type: 'negative' },
                { label: 'Dolor de panza', icon: '<i class="ph-bold ph-activity"></i>', type: 'negative' },
                { label: 'Pesada', icon: '<i class="ph-fill ph-sneaker"></i>', type: 'negative' },
            ];

            const moodOptions = [
                { value: 'terrible', icon: '<i class="ph-fill ph-smiley-sad text-3xl"></i>', color: 'text-rose-500 bg-rose-100', label: 'Malo' },
                { value: 'meh', icon: '<i class="ph-fill ph-smiley-meh text-3xl"></i>', color: 'text-amber-500 bg-amber-100', label: 'Regular' },
                { value: 'good', icon: '<i class="ph-fill ph-smiley text-3xl"></i>', color: 'text-emerald-500 bg-emerald-100', label: 'Bueno' },
                { value: 'great', icon: '<i class="ph-fill ph-smiley-wink text-3xl"></i>', color: 'text-teal-500 bg-teal-100', label: 'Excelente' },
            ];

            if (loading) return <div className="min-h-screen flex items-center justify-center font-bold text-orange-500"><i className="ph-bold ph-activity animate-pulse text-2xl mr-2"></i> Cargando tu energía...</div>;

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto space-y-6">
                    {/* HEADER */}
                    <div className="bg-white/90 backdrop-blur-md p-4 md:p-6 rounded-3xl shadow-sm border border-white flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="text-center md:text-left">
                            <h1 className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-orange-500 to-rose-500">Mi Energía Diaria</h1>
                            <p className="text-slate-500 capitalize text-sm font-bold">{date}</p>
                        </div>
                        
                        <div className="flex bg-stone-100 p-1.5 rounded-2xl">
                            <button onClick={() => setActiveTab('daily')} className={`flex items-center gap-2 px-6 py-2 rounded-xl font-black transition-all text-sm ${activeTab === 'daily' ? 'bg-white text-orange-500 shadow-sm' : 'text-stone-500'}`}>
                                <i className="ph-bold ph-calendar"></i> Día
                            </button>
                            <button onClick={() => setActiveTab('monthly')} className={`flex items-center gap-2 px-6 py-2 rounded-xl font-black transition-all text-sm ${activeTab === 'monthly' ? 'bg-white text-rose-500 shadow-sm' : 'text-stone-500'}`}>
                                <i className="ph-bold ph-trend-up"></i> Resumen
                            </button>
                        </div>

                        <button onClick={handleSave} className={`flex items-center gap-2 px-6 py-2.5 rounded-xl font-black transition-all text-sm ${saved ? 'bg-emerald-500 text-white' : 'bg-orange-500 text-white shadow-lg shadow-orange-200 hover:scale-105 active:scale-95'}`}>
                            {saved ? <i className="ph-bold ph-check-circle text-lg"></i> : <i className="ph-bold ph-floppy-disk text-lg"></i>}
                            {saved ? 'Guardado' : 'Guardar Día'}
                        </button>
                    </div>

                    {activeTab === 'daily' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {/* Puntuación e Ingresos */}
                            <div className="space-y-6">
                                <div className="bg-gradient-to-r from-orange-400 to-rose-400 p-6 rounded-3xl shadow-lg text-white flex justify-between items-center">
                                    <div>
                                        <h2 className="text-xl font-black flex items-center gap-2 mb-1"><i className="ph-bold ph-activity text-2xl"></i> Puntos de hoy</h2>
                                        <p className="text-orange-50 text-xs font-bold opacity-80">Base 100 puntos</p>
                                    </div>
                                    <div className="text-5xl font-black">{dailyScore}</div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                                    <h2 className="text-lg font-black text-slate-700 mb-4 flex items-center gap-2"><i className="ph-fill ph-check-circle text-emerald-500 text-xl"></i> Acciones</h2>
                                    <div className="grid grid-cols-1 gap-2">
                                        <HabitButton active={habits.gym} onClick={() => toggleHabit('gym')} icon='<i class="ph-fill ph-barbell"></i>' label="Gimnasia" color="emerald" />
                                        <HabitButton active={habits.recreation} onClick={() => toggleHabit('recreation')} icon='<i class="ph-fill ph-book-open"></i>' label="Recreación" color="purple" />
                                        <HabitButton active={habits.enzo} onClick={() => toggleHabit('enzo')} icon='<i class="ph-fill ph-dog"></i>' label="Pasear a Enzo" color="amber" />
                                        <HabitButton active={habits.inform} onClick={() => toggleHabit('inform')} icon='<i class="ph-fill ph-info"></i>' label="Informarme" color="blue" />
                                        <HabitButton active={habits.learn} onClick={() => toggleHabit('learn')} icon='<i class="ph-fill ph-graduation-cap"></i>' label="Proyecto / Tesis" color="indigo" />
                                        <HabitButton active={habits.friends} onClick={() => toggleHabit('friends')} icon='<i class="ph-fill ph-users"></i>' label="Amigos / Familia" color="rose" />
                                        <HabitButton active={habits.nico} onClick={() => toggleHabit('nico')} icon='<i class="ph-fill ph-heart"></i>' label="Tiempo con Nico" color="rose" />
                                    </div>
                                </div>
                            </div>

                            {/* Puntuaciones y Bienestar */}
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                                    <h2 className="text-lg font-black text-slate-700 mb-4 flex items-center gap-2"><i className="ph-fill ph-star text-amber-400 text-xl"></i> Calidad (1-5)</h2>
                                    <div className="space-y-3">
                                        <RatingRow label="Sueño" value={ratings.sleep} onChange={(v) => setRating('sleep', v)} icon='<i class="ph-fill ph-moon text-indigo-500"></i>' />
                                        <RatingRow label="Comida" value={ratings.food} onChange={(v) => setRating('food', v)} icon='<i class="ph-fill ph-fork-knife text-orange-500"></i>' />
                                        <RatingRow label="Agua" value={ratings.water} onChange={(v) => setRating('water', v)} icon='<i class="ph-fill ph-drop text-blue-500"></i>' />
                                        <RatingRow label="Trabajo" value={ratings.work} onChange={(v) => setRating('work', v)} icon='<i class="ph-fill ph-briefcase text-slate-500"></i>' />
                                        <RatingRow label="Celular" value={ratings.phone} onChange={(v) => setRating('phone', v)} icon='<i class="ph-fill ph-device-mobile text-rose-500"></i>' />
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-sm font-black text-slate-600 flex items-center gap-2 mb-2"><i className="ph-fill ph-sneaker text-orange-500 text-lg"></i> Pasos</label>
                                        <input type="number" value={steps} onChange={e => setSteps(e.target.value)} className="w-full p-3 bg-stone-50 border border-stone-200 rounded-2xl text-lg font-black outline-none focus:border-orange-400 focus:bg-white text-center" placeholder="0" />
                                    </div>
                                    <div>
                                        <label className="text-sm font-black text-slate-600 flex items-center gap-2 mb-2"><i className="ph-fill ph-calendar-blank text-rose-400 text-lg"></i> Ciclo</label>
                                        <input type="number" value={cycleDay} onChange={e => setCycleDay(e.target.value)} className="w-full p-3 bg-stone-50 border border-stone-200 rounded-2xl text-lg font-black outline-none focus:border-rose-400 focus:bg-white text-center" placeholder="Día" />
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                                    <h2 className="text-lg font-black text-slate-700 mb-4 flex items-center gap-2"><i className="ph-fill ph-brain text-purple-500 text-xl"></i> Sensaciones</h2>
                                    
                                    <div className="flex justify-between mb-5 bg-stone-50 p-2 rounded-2xl">
                                        {moodOptions.map(m => (
                                            <button key={m.value} onClick={() => setMood(m.value)} className={`p-3 flex-1 flex flex-col items-center gap-1 rounded-xl transition-all ${mood === m.value ? `${m.color} scale-105 shadow-md` : 'text-stone-400 hover:bg-stone-100'}`}>
                                                <div dangerouslySetInnerHTML={{__html: m.icon}}></div>
                                                <span className="text-[10px] font-bold uppercase tracking-wide">{m.label}</span>
                                            </button>
                                        ))}
                                    </div>

                                    <div className="flex flex-wrap gap-2">
                                        {physicalTags.map(tag => (
                                            <button key={tag.label} onClick={() => togglePhysicalState(tag.label)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold border transition-all ${physicalState.includes(tag.label) ? (tag.type === 'positive' ? 'bg-emerald-100 border-emerald-300 text-emerald-800' : 'bg-rose-100 border-rose-300 text-rose-800') : 'bg-white border-stone-200 text-stone-500 shadow-sm'}`}>
                                                <div dangerouslySetInnerHTML={{__html: tag.icon}}></div> {tag.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            {/* OBJETIVOS DEL MES */}
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-orange-100">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-slate-800 flex items-center gap-2"><i className="ph-fill ph-target text-orange-500 text-2xl"></i> Mis 3 Objetivos del Mes</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {monthlyGoals.map((goal, idx) => {
                                        const current = goal.habitKey ? historicalData.filter(d => d.habits && d.habits[goal.habitKey]).length : 0;
                                        const target = Number(goal.targetDays) || 0;
                                        const pct = target > 0 ? Math.min(100, Math.round((current / target) * 100)) : 0;
                                        return (
                                            <div key={goal.id} className="bg-orange-50/50 p-4 rounded-2xl border border-orange-100">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="bg-orange-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black">{idx + 1}</span>
                                                    <select value={goal.habitKey} onChange={e => updateGoal(goal.id, 'habitKey', e.target.value)} className="bg-white border border-orange-200 rounded-lg px-2 py-1 text-xs font-bold outline-none flex-1">
                                                        <option value="">Elegir Hábito...</option>
                                                        {Object.entries(habitLabels).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                                                    </select>
                                                </div>
                                                <div className="flex items-center justify-between mb-2">
                                                    <input type="number" value={goal.targetDays} onChange={e => updateGoal(goal.id, 'targetDays', e.target.value)} className="w-12 p-1 border rounded-lg text-center text-xs font-black" placeholder="Días" />
                                                    <span className="text-xs font-black text-orange-600">{current} / {target} días ({pct}%)</span>
                                                </div>
                                                <div className="h-2 w-full bg-stone-200 rounded-full overflow-hidden">
                                                    <div className="h-full bg-orange-400" style={{ width: `${pct}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* DASHBOARD CARDS */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="p-6 rounded-3xl border bg-rose-50 text-rose-700 border-rose-100 shadow-sm">
                                    <h4 className="text-[10px] font-black uppercase tracking-widest mb-2 opacity-70">PUNTUACIÓN PROMEDIO</h4>
                                    <div className="text-4xl font-black">{historicalData.length > 0 ? Math.round(historicalData.reduce((a,b)=>a+b.score,0)/historicalData.length) : 0}</div>
                                </div>
                                <div className="p-6 rounded-3xl border bg-amber-50 text-amber-700 border-amber-100 shadow-sm">
                                    <h4 className="text-[10px] font-black uppercase tracking-widest mb-2 opacity-70">DÍAS REGISTRADOS</h4>
                                    <div className="text-4xl font-black">{historicalData.length}</div>
                                </div>
                                <div className="p-6 rounded-3xl border bg-orange-50 text-orange-700 border-orange-100 shadow-sm">
                                    <h4 className="text-[10px] font-black uppercase tracking-widest mb-2 opacity-70">DÍA DEL MES</h4>
                                    <div className="text-4xl font-black">{new Date().getDate()}</div>
                                </div>
                            </div>

                            {/* GRÁFICO Y FRECUENCIA */}
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                                    <h3 className="font-black text-slate-800 mb-6">Evolución Diaria</h3>
                                    <div className="h-40 flex items-end gap-1 border-b border-l p-2">
                                        {historicalData.slice(0, 15).reverse().map((d, i) => (
                                            <div key={i} className="flex-1 bg-orange-200 rounded-t-sm relative group hover:bg-orange-400 transition-colors" style={{ height: `${d.score}%` }}>
                                                <div className="hidden group-hover:block absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] p-1 rounded font-bold">{d.score}</div>
                                            </div>
                                        ))}
                                        {historicalData.length === 0 && <p className="text-sm text-stone-400 m-auto">Guarda tu primer día para ver el gráfico.</p>}
                                    </div>
                                </div>
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                                    <h3 className="font-black text-slate-800 mb-6 flex items-center gap-2"><i className="ph-fill ph-brain text-purple-500 text-xl"></i> Sensaciones Acumuladas</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {physicalTags.map(tag => {
                                            const count = historicalData.filter(d => d.physicalState && d.physicalState.includes(tag.label)).length;
                                            if (count === 0) return null;
                                            return (
                                                <div key={tag.label} className={`flex items-center gap-2 px-3 py-1.5 rounded-xl border text-xs font-bold ${tag.type === 'positive' ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-rose-50 border-rose-100 text-rose-700'}`}>
                                                    <div dangerouslySetInnerHTML={{__html: tag.icon}}></div> <span>{tag.label}</span> <span className="opacity-50">({count})</span>
                                                </div>
                                            );
                                        })}
                                        {historicalData.length === 0 && <p className="text-sm text-stone-400">Aún no hay registros.</p>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
