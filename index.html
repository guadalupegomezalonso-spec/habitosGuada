<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Energía Diaria</title>
    
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Íconos (Phosphor Icons - Funcionan nativo en HTML) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Librerías de React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Procesa el código de React en el navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; }
        /* Oculta el icono de calendario por defecto en inputs date para estilizarlos mejor */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="month"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        input[type="date"]::-webkit-calendar-picker-indicator:hover,
        input[type="month"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-orange-50 to-rose-50 min-h-screen text-slate-800 pb-12">
    
    <!-- Aquí se cargará la app -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE FIREBASE (Adaptada para el entorno) ---
        const envConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const firebaseConfig = envConfig || {
            apiKey: "AIzaSyAkhWpZAD7dS02e31o47q_IkI_C3cwKvw0",
            authDomain: "habitos-guada.firebaseapp.com",
            projectId: "habitos-guada",
            storageBucket: "habitos-guada.firebasestorage.app",
            messagingSenderId: "151671576862",
            appId: "1:151671576862:web:54a60bf332537b683a110f",
            measurementId: "G-2QNG8Y123J"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Funciones auxiliares para fechas locales
        const getLocalYYYYMMDD = () => {
            const d = new Date();
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('daily');
            const [saved, setSaved] = useState(false);
            const [historicalData, setHistoricalData] = useState([]);
            const [loading, setLoading] = useState(true);

            // Estados para el control del tiempo
            const [selectedDate, setSelectedDate] = useState(getLocalYYYYMMDD());
            const [selectedMonth, setSelectedMonth] = useState(getLocalYYYYMMDD().slice(0, 7)); // Formato YYYY-MM
            
            // Estado para el gráfico interactivo de calidades
            const [selectedQualityChart, setSelectedQualityChart] = useState('movement');

            // Configuraciones Guardadas (Objetivos y Ciclo)
            const [monthlyGoals, setMonthlyGoals] = useState([
                { id: 1, habitKey: '', targetDays: '' },
                { id: 2, habitKey: '', targetDays: '' },
                { id: 3, habitKey: '', targetDays: '' }
            ]);
            const [goalsLocked, setGoalsLocked] = useState(false);
            const [goalError, setGoalError] = useState('');
            const [lastPeriodDate, setLastPeriodDate] = useState(''); // El Día 1 de Guada

            const habitLabels = {
                gym: 'Gimnasia', recreation: 'Recreación', enzo: 'Pasear a Enzo', 
                inform: 'Informarme', learn: 'Aprender algo', friends: 'Amigos/Familia', nico: 'Tiempo con Nico'
            };
            
            const qualityLabels = {
                movement: 'Movimiento', sleep: 'Sueño', food: 'Comida', 
                water: 'Agua', productivity: 'Productividad', stress: 'Control del Estrés', phone: 'Tiempo de Celular'
            };

            const [habits, setHabits] = useState({ gym: false, recreation: false, enzo: false, inform: false, learn: false, friends: false, nico: false });
            const [ratings, setRatings] = useState({ movement: 0, sleep: 0, food: 0, water: 0, productivity: 0, stress: 0, phone: 0 });
            const [mood, setMood] = useState(null);
            const [physicalState, setPhysicalState] = useState([]);
            const [notes, setNotes] = useState(''); 

            // Autenticación (Corregida para evitar errores de permisos)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error", err);
                        setLoading(false);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) setLoading(false);
                });
                
                return () => unsubscribe();
            }, []);

            // Cargar Historial y Configuraciones
            useEffect(() => {
                if (!user) return; // Regla estricta: No consultar si no hay usuario
                
                // Rutas adaptadas al entorno seguro
                const logsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'daily_logs');
                const unsubLogs = onSnapshot(logsRef, 
                    (snap) => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        data.sort((a, b) => new Date(b.date) - new Date(a.date));
                        setHistoricalData(data);
                        setLoading(false);
                    },
                    (error) => { console.error("Error fetching logs:", error); setLoading(false); }
                );

                // Cargar Configuración del Ciclo
                const cycleRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'cycle');
                const unsubCycle = onSnapshot(cycleRef, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().lastPeriodDate) setLastPeriodDate(docSnap.data().lastPeriodDate);
                }, (error) => console.error("Error fetching cycle:", error));

                return () => { unsubLogs(); unsubCycle(); };
            }, [user]);

            // Cargar Metas por Mes Seleccionado
            useEffect(() => {
                if (!user) return;
                const goalsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'monthly_goals', selectedMonth);
                const unsubGoals = onSnapshot(goalsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setMonthlyGoals(data.goals || [
                            { id: 1, habitKey: '', targetDays: '' },
                            { id: 2, habitKey: '', targetDays: '' },
                            { id: 3, habitKey: '', targetDays: '' }
                        ]);
                        setGoalsLocked(data.locked || false);
                    } else {
                        setMonthlyGoals([
                            { id: 1, habitKey: '', targetDays: '' },
                            { id: 2, habitKey: '', targetDays: '' },
                            { id: 3, habitKey: '', targetDays: '' }
                        ]);
                        setGoalsLocked(false);
                    }
                }, (error) => console.error("Error fetching goals:", error));
                return () => unsubGoals();
            }, [user, selectedMonth]);

            // Cargar datos al cambiar de fecha en la pestaña Diaria
            useEffect(() => {
                const dayData = historicalData.find(d => d.id === selectedDate);
                if (dayData) {
                    setHabits(dayData.habits || { gym: false, recreation: false, enzo: false, inform: false, learn: false, friends: false, nico: false });
                    setRatings(dayData.ratings || { movement: 0, sleep: 0, food: 0, water: 0, productivity: 0, stress: 0, phone: 0 });
                    setMood(dayData.mood || null);
                    setPhysicalState(dayData.physicalState || []);
                    setNotes(dayData.notes || '');
                } else {
                    setHabits({ gym: false, recreation: false, enzo: false, inform: false, learn: false, friends: false, nico: false });
                    setRatings({ movement: 0, sleep: 0, food: 0, water: 0, productivity: 0, stress: 0, phone: 0 });
                    setMood(null);
                    setPhysicalState([]);
                    setNotes('');
                }
            }, [selectedDate, historicalData]);

            // Lógica de Puntuación (Max 100)
            const dailyScore = useMemo(() => {
                let score = 0;
                const habitKeys = Object.keys(habits);
                const completedHabitsCount = habitKeys.filter(k => habits[k]).length;
                
                score += (completedHabitsCount / habitKeys.length) * 30; 
                score += (ratings.movement || 0) * 2; 
                score += (ratings.food || 0) * 2;  
                score += (ratings.water || 0) * 2; 
                score += (ratings.sleep || 0) * 2; 
                score += (ratings.productivity || 0) * 2; 
                score += (ratings.stress || 0) * 2; 
                score += (ratings.phone || 0) * 2; 

                return Math.min(100, Math.round(score));
            }, [habits, ratings]);

            // Cálculo Inteligente del Ciclo
            const cycleInfo = useMemo(() => {
                if (!lastPeriodDate) return null;
                
                const start = new Date(lastPeriodDate + 'T00:00:00'); 
                const current = new Date(selectedDate + 'T00:00:00');
                const diffTime = current - start;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

                if (diffDays < 1) return null; 

                // El día dentro del ciclo (1 a 28)
                const dayInCycle = ((diffDays - 1) % 28) + 1;

                let phase = ""; let desc = ""; let icon = ""; let bg = ""; let badgeColor = ""; let badgeBorder = "";

                if (dayInCycle >= 1 && dayInCycle <= 5) {
                    phase = "Fase Menstrual";
                    desc = "Energía más baja. Priorizá el descanso, comer calentito y la introspección. Movimiento suave si lo sentís.";
                    icon = "ph-drop"; 
                    bg = "bg-gradient-to-br from-rose-50 to-rose-100/50 border-rose-200";
                    badgeColor = "bg-rose-200 text-rose-800";
                    badgeBorder = "border-rose-300";
                } else if (dayInCycle >= 6 && dayInCycle <= 13) {
                    phase = "Fase Folicular";
                    desc = "Energía y creatividad en aumento. Excelente momento para iniciar proyectos, socializar y entrenar fuerte.";
                    icon = "ph-plant"; 
                    bg = "bg-gradient-to-br from-emerald-50 to-emerald-100/50 border-emerald-200";
                    badgeColor = "bg-emerald-200 text-emerald-800";
                    badgeBorder = "border-emerald-300";
                } else if (dayInCycle >= 14 && dayInCycle <= 16) {
                    phase = "Fase Ovulatoria";
                    desc = "Pico de energía, confianza y magnetismo. El mejor momento para brillar, comunicarte y salir al mundo.";
                    icon = "ph-sun"; 
                    bg = "bg-gradient-to-br from-amber-50 to-amber-100/50 border-amber-200";
                    badgeColor = "bg-amber-200 text-amber-800";
                    badgeBorder = "border-amber-300";
                } else {
                    phase = "Fase Lútea";
                    desc = "Energía en descenso gradual. Foco en los detalles y cierre de tareas. Si sentís SPM o te sentís pesada, bajá un cambio.";
                    icon = "ph-moon"; 
                    bg = "bg-gradient-to-br from-indigo-50 to-indigo-100/50 border-indigo-200";
                    badgeColor = "bg-indigo-200 text-indigo-800";
                    badgeBorder = "border-indigo-300";
                }

                // Porcentaje para la barra de progreso (sobre 28 días)
                const progressPct = (dayInCycle / 28) * 100;

                return { absoluteDay: diffDays, dayInCycle, phase, desc, icon, bg, badgeColor, badgeBorder, progressPct };
            }, [lastPeriodDate, selectedDate]);

            // Handlers
            const handleSave = async () => {
                if (!user) return;
                setSaved(true);
                const logDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'daily_logs', selectedDate);
                
                await setDoc(logDoc, {
                    date: selectedDate,
                    score: dailyScore,
                    habits, ratings, mood, physicalState, notes
                });
                setTimeout(() => setSaved(false), 2000);
            };

            const updateGoal = async (id, field, value) => {
                if (goalsLocked) return;
                const updated = monthlyGoals.map(g => g.id === id ? { ...g, [field]: value } : g);
                setMonthlyGoals(updated);
                if (user) {
                    const goalsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'monthly_goals', selectedMonth);
                    await setDoc(goalsRef, { goals: updated, locked: goalsLocked }, { merge: true });
                }
            };

            const lockGoalsForMonth = async () => {
                if (!user) return;
                const isValid = monthlyGoals.every(g => g.habitKey && Number(g.targetDays) > 0);
                if (!isValid) {
                    setGoalError('Completá los 3 hábitos y sus días meta antes de fijarlos.');
                    setTimeout(() => setGoalError(''), 4000);
                    return;
                }
                setGoalsLocked(true);
                const goalsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'monthly_goals', selectedMonth);
                await setDoc(goalsRef, { goals: monthlyGoals, locked: true }, { merge: true });
            };

            const updateLastPeriod = async (value) => {
                setLastPeriodDate(value);
                if (user) {
                    const cycleRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'cycle');
                    await setDoc(cycleRef, { lastPeriodDate: value }, { merge: true });
                }
            };

            const toggleHabit = (key) => setHabits(prev => ({ ...prev, [key]: !prev[key] }));
            const setRating = (key, value) => setRatings(prev => ({ ...prev, [key]: value }));
            const togglePhysicalState = (tag) => {
                setPhysicalState(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);
            };

            // Frases Motivacionales Inteligentes
            const getDailyMotivation = () => {
                if (dailyScore > 85) return "¡Estás teniendo un día excelente! Mantené esa energía, te lo merecés. 🌟";
                
                let lowestRating = { key: '', val: 6 };
                Object.entries(ratings).forEach(([k, v]) => {
                    if (v > 0 && v < lowestRating.val) lowestRating = { key: k, val: v };
                });

                if (lowestRating.val <= 2) {
                    if (lowestRating.key === 'movement') return "Tu cuerpo necesita moverse un poco para destrabar energía. ¡Probá con estirar 5 minutos o caminar! 🚶‍♀️";
                    if (lowestRating.key === 'sleep') return "Parece que el descanso no fue el mejor. Tratá de irte a la cama un ratito antes hoy y soltá las pantallas. 💤";
                    if (lowestRating.key === 'water') return "¡Cuidado con la hidratación! Tomate un vaso de agua ahora mismo, tu cuerpo y cerebro te lo van a agradecer. 💧";
                    if (lowestRating.key === 'food') return "No te castigues si hoy la comida no fue ideal. En la próxima comida priorizá algo nutritivo que te haga sentir bien. 🥗";
                    if (lowestRating.key === 'phone') return "Las pantallas nos roban mucha energía. Dejá el celu en otra habitación por un rato y conectá con tu presente. 📵";
                    if (lowestRating.key === 'productivity') return "La productividad no lo es todo. A veces hacer menos pero con más foco es la verdadera clave. ¡Mañana será otro día! 🎯";
                    if (lowestRating.key === 'stress') return "Noté que el control del estrés estuvo difícil hoy. Priorizá tu paz mental, soltá lo que no podés controlar y respirá profundo. 🍃";
                }

                if (physicalState.includes('Estresada')) return "Noté que te sentís estresada. Dedicá 5 minutos a respirar profundo o hacer algo que te relaje. Tu paz mental es prioridad. 🧘‍♀️";
                if (mood === 'terrible' || mood === 'meh') return "Hay días más difíciles que otros. Sé amable con vos misma hoy, hacé lo mínimo indispensable y descansá. ❤️";
                
                return "Un paso a la vez. No busques la perfección, buscá la constancia. ¡Vos podés con este día! 💪";
            };

            const getMonthlyFeedback = (avg, best, worst, totalDays) => {
                if (totalDays === 0) return "Todavía no hay registros en este mes. ¡Seleccioná otro mes o empezá a guardar tus días para ver tu evolución!";
                
                let text = `En lo que va del mes registraste ${totalDays} días, con una energía promedio de ${avg}/100. `;
                
                if (avg >= 80) text += "¡La verdad que venís excelente! Mantener este equilibrio es un gran logro. ";
                else if (avg >= 50) text += "Venís con un buen ritmo. Hay días mejores y peores, pero la constancia es lo que cuenta. ";
                else text += "Ha sido un mes con altibajos, pero lo más valioso es que te estás tomando el tiempo de registrar y conocerte. ";
                
                if (best && best !== 'No hay datos suficientes.') text += `Tu punto más fuerte de acción viene siendo '${best}', ¡felicidades por sostenerlo! `;
                if (worst && worst !== 'No hay datos suficientes.') text += `Como recomendación para lo que queda del mes, podrías poner un poquito más de amor y foco en '${worst}'.`;
                
                return text;
            };

            // Componentes UI Reutilizables
            const HabitButton = ({ active, onClick, icon, label, color }) => {
                const colorStyles = {
                    emerald: active ? 'bg-emerald-50 border-emerald-300 text-emerald-800' : 'hover:border-emerald-200',
                    amber: active ? 'bg-amber-50 border-amber-300 text-amber-800' : 'hover:border-amber-200',
                    purple: active ? 'bg-purple-50 border-purple-300 text-purple-800' : 'hover:border-purple-200',
                    blue: active ? 'bg-blue-50 border-blue-300 text-blue-800' : 'hover:border-blue-200',
                    indigo: active ? 'bg-indigo-50 border-indigo-300 text-indigo-800' : 'hover:border-indigo-200',
                    rose: active ? 'bg-rose-50 border-rose-300 text-rose-800' : 'hover:border-rose-200',
                };
                return (
                    <button onClick={onClick} className={`flex items-center justify-between p-3 rounded-2xl transition-all border ${active ? colorStyles[color] : 'bg-stone-50 border-stone-100 text-stone-600 shadow-sm'}`}>
                        <div className="flex items-center gap-3">
                            <div className={`p-2 rounded-xl text-lg ${active ? 'bg-white shadow-sm' : 'bg-stone-200 text-stone-500'}`} dangerouslySetInnerHTML={{__html: icon}}></div>
                            <span className="font-bold text-sm">{label}</span>
                        </div>
                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${active ? 'border-current bg-current' : 'border-stone-300'}`}>
                            {active && <i className="ph-bold ph-check text-white text-xs"></i>}
                        </div>
                    </button>
                );
            };

            const RatingRow = ({ label, value, onChange, icon }) => (
                <div className="flex items-center justify-between p-2 rounded-xl hover:bg-stone-50 transition-colors">
                    <div className="flex items-center gap-2">
                        <div className="bg-stone-100 p-2 rounded-lg text-lg" dangerouslySetInnerHTML={{__html: icon}}></div>
                        <span className="font-bold text-sm text-slate-700">{label}</span>
                    </div>
                    <div className="flex gap-1.5">
                        {[1, 2, 3, 4, 5].map((num) => (
                            <button key={num} onClick={() => onChange(num)} className={`w-8 h-8 rounded-full text-sm font-black transition-all ${value === num ? 'bg-orange-400 text-white shadow-md scale-110' : 'bg-stone-100 text-stone-400 hover:bg-stone-200'}`}>
                                {num}
                            </button>
                        ))}
                    </div>
                </div>
            );

            // Nuevas Etiquetas Físicas
            const physicalTags = [
                { label: 'Llena de energía', icon: '<i class="ph-fill ph-lightning"></i>', type: 'positive' },
                { label: 'Liviana', icon: '<i class="ph-fill ph-feather"></i>', type: 'positive' },
                { label: 'Fuerte', icon: '<i class="ph-fill ph-barbell"></i>', type: 'positive' },
                { label: 'Descansada', icon: '<i class="ph-fill ph-coffee"></i>', type: 'positive' },
                { label: 'Inspirada', icon: '<i class="ph-fill ph-fire"></i>', type: 'positive' },
                { label: 'Estresada', icon: '<i class="ph-fill ph-warning-octagon"></i>', type: 'negative' },
                { label: 'Cansada', icon: '<i class="ph-fill ph-battery-warning"></i>', type: 'negative' },
                { label: 'Dolorida', icon: '<i class="ph-fill ph-warning-circle"></i>', type: 'negative' },
                { label: 'Con Hambre', icon: '<i class="ph-fill ph-fork-knife"></i>', type: 'negative' },
                { label: 'Mal humorada', icon: '<i class="ph-fill ph-smiley-sad"></i>', type: 'negative' },
                { label: 'Dolor de cabeza', icon: '<i class="ph-fill ph-brain"></i>', type: 'negative' },
                { label: 'Dolor de panza', icon: '<i class="ph-bold ph-activity"></i>', type: 'negative' },
                { label: 'Pesada', icon: '<i class="ph-fill ph-sneaker"></i>', type: 'negative' },
            ];

            const moodOptions = [
                { value: 'terrible', icon: '<i class="ph-fill ph-smiley-sad text-3xl"></i>', color: 'text-rose-500 bg-rose-100', label: 'Malo' },
                { value: 'meh', icon: '<i class="ph-fill ph-smiley-meh text-3xl"></i>', color: 'text-amber-500 bg-amber-100', label: 'Regular' },
                { value: 'good', icon: '<i class="ph-fill ph-smiley text-3xl"></i>', color: 'text-emerald-500 bg-emerald-100', label: 'Bueno' },
                { value: 'great', icon: '<i class="ph-fill ph-smiley-wink text-3xl"></i>', color: 'text-teal-500 bg-teal-100', label: 'Excelente' },
            ];

            if (loading) return <div className="min-h-screen flex items-center justify-center font-bold text-orange-500"><i className="ph-bold ph-activity animate-pulse text-2xl mr-2"></i> Cargando tu energía...</div>;

            // --- PROCESAMIENTO DE DATOS PARA EL RESUMEN ---
            const thisMonthData = historicalData.filter(d => d.id.startsWith(selectedMonth));
            const totalDays = thisMonthData.length;
            const avgScore = totalDays > 0 ? Math.round(thisMonthData.reduce((a,b)=>a+b.score,0)/totalDays) : 0;
            
            const habitCounts = { gym: 0, recreation: 0, enzo: 0, inform: 0, learn: 0, friends: 0, nico: 0 };
            thisMonthData.forEach(day => { Object.keys(habitCounts).forEach(h => { if(day.habits && day.habits[h]) habitCounts[h]++; }); });
            const habitPercentages = Object.keys(habitCounts).map(k => ({ key: k, label: habitLabels[k], percent: totalDays > 0 ? Math.round((habitCounts[k] / totalDays) * 100) : 0 })).sort((a,b) => b.percent - a.percent);
            
            const bestHabit = habitPercentages.length > 0 && totalDays > 0 ? habitPercentages[0].label : 'No hay datos suficientes.';
            const worstHabit = habitPercentages.length > 0 && totalDays > 0 ? habitPercentages[habitPercentages.length - 1].label : 'No hay datos suficientes.';

            // Extraer las notas del mes para el Diario
            const monthNotes = thisMonthData.filter(d => d.notes && d.notes.trim() !== '');

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto space-y-6">
                    {/* HEADER */}
                    <div className="bg-white/90 backdrop-blur-md p-4 md:p-6 rounded-3xl shadow-sm border border-white flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="text-center md:text-left">
                            <h1 className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-orange-500 to-rose-500">Mi Energía Diaria</h1>
                            {activeTab === 'daily' ? (
                                <div className="mt-1 flex items-center justify-center md:justify-start gap-2 text-slate-500 font-bold bg-orange-50 px-3 py-1 rounded-lg border border-orange-100">
                                    <i className="ph-fill ph-calendar text-orange-400"></i>
                                    <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="bg-transparent outline-none text-sm cursor-pointer" />
                                </div>
                            ) : (

                                    {cycleInfo ? (

                                    </div>
                                    <div className="text-5xl font-black">{dailyScore}</div>

                                        <HabitButton active={habits.nico} onClick={() => toggleHabit('nico')} icon='<i class="ph-fill ph-heart"></i>' label="Tiempo con Nico" color="rose" />

                                </div>

                                        <RatingRow label="Sueño" value={ratings.sleep} onChange={(v) => setRating('sleep', v)} icon='<i class="ph-fill ph-moon text-indigo-500"></i>' />
                                        <RatingRow label="Comida" value={ratings.food} onChange={(v) => setRating('food', v)} icon='<i class="ph-fill ph-fork-knife text-orange-500"></i>' />
                                        <RatingRow label="Agua" value={ratings.water} onChange={(v) => setRating('water', v)} icon='<i class="ph-fill ph-drop text-blue-500"></i>' />

                                        <RatingRow label="Control del Estrés" value={ratings.stress} onChange={(v) => setRating('stress', v)} icon='<i class="ph-fill ph-leaf text-emerald-400"></i>' />
                                        <RatingRow label="Control de Celular" value={ratings.phone} onChange={(v) => setRating('phone', v)} icon='<i class="ph-fill ph-device-mobile text-rose-500"></i>' />

                                                <div dangerouslySetInnerHTML={{__html: m.icon}}></div>
                                                <span className="text-[10px] font-bold uppercase tracking-wide">{m.label}</span>
                                            </button>

                                    </div>

                                    <div className="flex flex-wrap gap-2">

                                            </button>

                                    </h3>
                                </div>

                                    {monthlyGoals.map((goal, idx) => {
                                        const current = goal.habitKey ? thisMonthData.filter(d => d.habits && d.habits[goal.habitKey]).length : 0;
                                        const target = Number(goal.targetDays) || 0;
                                        const pct = target > 0 ? Math.min(100, Math.round((current / target) * 100)) : 0;

                                            // VISTA BLOQUEADA (DASHBOARD ELEGANTE)

                                                <div key={goal.id} className="bg-white/20 backdrop-blur-sm p-5 rounded-2xl border border-white/30 relative overflow-hidden">

                                                        <span className="bg-white/30 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-black">{idx + 1}</span>

                                                    <div className="flex items-end justify-between mb-2">
                                                        <span className="text-3xl font-black">{current} <span className="text-lg opacity-80">/ {target}</span></span>

                                                <i className="ph-fill ph-lock-key"></i> Fijar Objetivos

                                        </div>
                                    </div>

                                <p className="text-rose-800 text-sm font-bold leading-relaxed">{getMonthlyFeedback(avgScore, bestHabit, worstHabit, totalDays)}</p>
                            </div>

                            {/* DASHBOARD CARDS */}

                                <div className="p-6 rounded-3xl border bg-rose-50 text-rose-700 border-rose-100 shadow-sm flex items-center justify-between">
                                    <div>
                                        <h4 className="text-[10px] font-black uppercase tracking-widest mb-1 opacity-70">PUNTUACIÓN PROMEDIO</h4>

                                    </div>
                                    <i className="ph-fill ph-chart-line-up text-4xl opacity-20"></i>
                                </div>
                                <div className="p-6 rounded-3xl border bg-amber-50 text-amber-700 border-amber-100 shadow-sm flex items-center justify-between">
                                    <div>
                                        <h4 className="text-[10px] font-black uppercase tracking-widest mb-1 opacity-70">DÍAS REGISTRADOS</h4>
                                        <div className="text-4xl font-black">{totalDays}</div>
                                    </div>
                                    <i className="ph-fill ph-calendar-check text-4xl opacity-20"></i>
                                </div>
                            </div>

                            {/* GRÁFICOS Y ANÁLISIS DETALLADO */}

                                {/* DESGLOSE DE CALIDADES (Gráfico filtrable) */}

                                    <div className="h-48 flex items-end gap-1.5 border-b border-l border-stone-200 p-2 relative w-full mt-auto">

                                        {[...thisMonthData].reverse().slice(0, 31).map((d, i) => {
                                            const val = d.ratings?.[selectedQualityChart] || 0;

                                            return (
                                                <div key={i} className="flex-1 bg-amber-200 rounded-t-md relative group hover:bg-amber-400 transition-colors" style={{ height: `${hPct}%` }}>

                                                        Día {d.id.slice(-2)}: {val} pts
                                                    </div>
                                                </div>
                                            )
                                        })}
                                        {thisMonthData.length === 0 && <p className="text-sm text-stone-400 m-auto">Sin datos en este mes.</p>}
                                    </div>
                                </div>

                                {/* RENDIMIENTO DE ACCIONES (Barras horizontales) */}
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                                    <h3 className="font-black text-slate-800 mb-6 flex items-center gap-2"><i className="ph-fill ph-list-checks text-emerald-500 text-xl"></i> Cumplimiento de Acciones</h3>
                                    <div className="space-y-4">
                                        {habitPercentages.map((habit, i) => (
                                            <div key={i} className="flex items-center gap-4">
                                                <div className="w-1/3 text-right text-xs font-black text-slate-600 truncate" title={habit.label}>{habit.label}</div>
                                                <div className="w-2/3 h-3.5 bg-stone-100 rounded-full overflow-hidden relative">
                                                    <div className="h-full bg-gradient-to-r from-emerald-300 to-teal-400 rounded-full transition-all duration-1000" style={{ width: `${habit.percent}%` }}></div>
                                                </div>
                                                <div className="w-8 text-xs font-black text-emerald-700">{habit.percent}%</div>
                                            </div>
                                        ))}
                                        {thisMonthData.length === 0 && <p className="text-sm text-stone-400">Sin datos en este mes.</p>}
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">

                                    <div className="h-40 flex items-end gap-1.5 border-b border-l border-stone-200 p-2 relative">
                                        {[...thisMonthData].reverse().slice(0, 31).map((d, i) => (

                                                </div>
                                            </div>

                                        {thisMonthData.length === 0 && <p className="text-sm text-stone-400 m-auto">Sin datos en este mes.</p>}
                                    </div>

                                            const count = thisMonthData.filter(d => d.physicalState && d.physicalState.includes(tag.label)).length;
                                            if (count === 0) return null;
                                            return (
                                                <div key={tag.label} className={`flex items-center gap-2 px-3 py-1.5 rounded-xl border text-xs font-bold ${tag.type === 'positive' ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 'bg-rose-50 border-rose-100 text-rose-700'}`}>
                                                    <div dangerouslySetInnerHTML={{__html: tag.icon}}></div> <span>{tag.label}</span> <span className="opacity-50">({count})</span>
                                                </div>
                                            );
                                        })}
                                        {thisMonthData.length === 0 && <p className="text-sm text-stone-400">Sin registros de sensaciones.</p>}
                                    </div>
                                </div>
                            </div>
                            
                            {/* NUEVO: DIARIO DEL MES */}
                            <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-stone-100">
                                <h3 className="font-black text-slate-800 mb-6 flex items-center gap-2"><i className="ph-fill ph-book-open text-teal-500 text-2xl"></i> Diario del Mes</h3>
                                {monthNotes.length > 0 ? (
                                    <div className="space-y-4">
                                        {[...monthNotes].reverse().map(d => {
                                            const dayMood = moodOptions.find(m => m.value === d.mood);
                                            return (
                                                <div key={d.id} className="p-5 bg-stone-50 rounded-2xl border border-stone-100 hover:border-teal-200 transition-colors">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <span className="font-black text-sm text-teal-800 flex items-center gap-2">
                                                            <i className="ph-fill ph-calendar-blank"></i> {d.date}
                                                        </span>
                                                        <div className="flex items-center gap-2">
                                                            {dayMood && <div className="text-2xl" dangerouslySetInnerHTML={{__html: dayMood.icon}}></div>}
                                                            <span className="text-xs font-black bg-white px-2.5 py-1 rounded-lg border border-stone-200 shadow-sm">{d.score} pts</span>
                                                        </div>
                                                    </div>
                                                    <p className="text-sm text-slate-700 font-medium leading-relaxed whitespace-pre-wrap">{d.notes}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="text-center p-8 bg-stone-50 rounded-2xl border border-dashed border-stone-200 text-stone-400 font-bold">
                                        Todavía no hay notas escritas este mes.<br/>Todo lo que escribas en "Diario y Notas" aparecerá aquí.
                                    </div>
                                )}
                            </div>

                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
